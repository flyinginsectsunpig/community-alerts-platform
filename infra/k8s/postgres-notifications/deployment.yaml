apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-notifications
  namespace: community-alerts
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-notifications
  template:
    metadata:
      labels:
        app: postgres-notifications
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: notifications
            - name: POSTGRES_USER
              value: communityalerts
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: community-alerts-secrets
                  key: notifications-db-password
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-notifications-pvc
