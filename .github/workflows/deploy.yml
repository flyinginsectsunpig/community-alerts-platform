# ─────────────────────────────────────────────────────────────────────────────
# Community Alerts — CI/CD Pipeline for Azure Container Apps
#
# Triggers on push to main. Builds all three service images, pushes
# them to Azure Container Registry, and deploys to Container Apps.
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_NAME: communityalertsacr
  RESOURCE_GROUP: community-alerts-rg
  LOCATION: southafricanorth

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      # ── Build & Push Images ────────────────────────────────────────────────
      - name: Build Java API
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/community-alerts/java-api:${{ github.sha }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/community-alerts/java-api:latest \
            services/java-api
          docker push ${{ env.ACR_NAME }}.azurecr.io/community-alerts/java-api --all-tags

      - name: Build .NET Service
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/community-alerts/dotnet-notifications:${{ github.sha }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/community-alerts/dotnet-notifications:latest \
            services/notification-api-dotnet
          docker push ${{ env.ACR_NAME }}.azurecr.io/community-alerts/dotnet-notifications --all-tags

      - name: Build Python ML Service
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/community-alerts/ml-python:${{ github.sha }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/community-alerts/ml-python:latest \
            services/ml-api-python
          docker push ${{ env.ACR_NAME }}.azurecr.io/community-alerts/ml-python --all-tags

      # ── Deploy to Azure Container Apps ─────────────────────────────────────
      - name: Deploy Java API
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: community-alerts-java
          imageToDeploy: ${{ env.ACR_NAME }}.azurecr.io/community-alerts/java-api:${{ github.sha }}

      - name: Deploy .NET Service
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: community-alerts-dotnet
          imageToDeploy: ${{ env.ACR_NAME }}.azurecr.io/community-alerts/dotnet-notifications:${{ github.sha }}

      - name: Deploy Python ML Service
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: community-alerts-ml
          imageToDeploy: ${{ env.ACR_NAME }}.azurecr.io/community-alerts/ml-python:${{ github.sha }}
