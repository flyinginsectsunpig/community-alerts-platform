name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_NAME: communityalertsacr
  RESOURCE_GROUP: community-alerts-rg

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build & Push Java API
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/java-api:${{ github.sha }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/java-api:latest \
            services/java-api
          docker push ${{ env.ACR_NAME }}.azurecr.io/java-api --all-tags

      - name: Build & Push .NET Service
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/notification-api-dotnet:${{ github.sha }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/notification-api-dotnet:latest \
            services/notification-api-dotnet
          docker push ${{ env.ACR_NAME }}.azurecr.io/notification-api-dotnet --all-tags

      - name: Build & Push Python ML
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/ml-api-python:${{ github.sha }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/ml-api-python:latest \
            services/ml-api-python
          docker push ${{ env.ACR_NAME }}.azurecr.io/ml-api-python --all-tags


      - name: Build & Push Frontend
        run: |
          docker build \
            -t ${{ env.ACR_NAME }}.azurecr.io/web:${{ github.sha }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/web:latest \
            apps/community-alerts-web
          docker push ${{ env.ACR_NAME }}.azurecr.io/web --all-tags

      - name: Deploy Java API
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: community-alerts-java
          imageToDeploy: ${{ env.ACR_NAME }}.azurecr.io/java-api:${{ github.sha }}

      - name: Scale Java API Resources
        run: |
          az containerapp update \
            --name community-alerts-java \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --cpu 2.0 \
            --memory 4.0Gi \
            --set-env-vars JAVA_TOOL_OPTIONS="-Xmx3g -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"

      - name: Deploy .NET Service
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: community-alerts-dotnet
          imageToDeploy: ${{ env.ACR_NAME }}.azurecr.io/notification-api-dotnet:${{ github.sha }}

      - name: Configure .NET Service Environment
        run: |
          az containerapp update \
            --name community-alerts-dotnet \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --set-env-vars \
              "ASPNETCORE_ENVIRONMENT=Production" \
              "ConnectionStrings__Default=Host=community-alerts-pg-dotnet.postgres.database.azure.com;Port=5432;Database=notifications;Username=communityalerts;Password=${{ secrets.DOTNET_DB_PASSWORD }};SslMode=Require"

      - name: Deploy Python ML
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: community-alerts-ml
          imageToDeploy: ${{ env.ACR_NAME }}.azurecr.io/ml-api-python:${{ github.sha }}

      - name: Deploy Frontend
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: community-alerts-web
          imageToDeploy: ${{ env.ACR_NAME }}.azurecr.io/web:${{ github.sha }}