# ─────────────────────────────────────────────────────────────────────────────
# Community Alerts — Backend Services Docker Compose
#
# Services:
#   backend-java          Spring Boot API         → localhost:8080
#   backend-ml-python     FastAPI ML service      → localhost:8001
#   backend-csharp        .NET notification svc   → localhost:5001
#
# Usage:
#   docker compose up --build
# ─────────────────────────────────────────────────────────────────────────────

services:
  postgres-notifications:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=notifications
      - POSTGRES_USER=communityalerts
      - POSTGRES_PASSWORD=communityalerts
    ports:
      - "5432:5432"
    volumes:
      - notifications-pg-data:/var/lib/postgresql/data
    networks:
      - community-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U communityalerts -d notifications"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Spring Boot API ──────────────────────────────────────────────────────────
  backend-java:
    build:
      context: ../../services/java-api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - NOTIFICATION_SERVICE_URL=http://backend-csharp:5001
    depends_on:
      - backend-csharp
    networks:
      - community-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/suburbs"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Python ML Service ─────────────────────────────────────────────────────
  backend-ml-python:
    build:
      context: ../../services/ml-api-python
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    networks:
      - community-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8001/api/v1/ml/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── C# Notification Service ───────────────────────────────────────────────
  backend-csharp:
    build:
      context: ../../services/notification-api-dotnet
      dockerfile: Dockerfile
    depends_on:
      postgres-notifications:
        condition: service_healthy
    ports:
      - "5001:5001"
    environment:
      - ServiceUrls__SpringBoot=http://backend-java:8080
      - ServiceUrls__MLService=http://backend-ml-python:8001
      - Email__Mode=Log     # Change to "Send" with SMTP credentials in production
      - DatabaseProvider=Postgres
      - ConnectionStrings__Default=Host=postgres-notifications;Port=5432;Database=notifications;Username=communityalerts;Password=communityalerts
    networks:
      - community-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  community-net:
    driver: bridge

volumes:
  notifications-pg-data:
