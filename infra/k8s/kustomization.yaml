# Community Alerts — Kubernetes Deployment
# Managed via Kustomize: kubectl apply -k infra/k8s/

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: community-alerts

resources:
  - namespace.yaml
  - secrets.yaml
  - configmap.yaml
  # Database
  - postgres-java/deployment.yaml
  - postgres-java/service.yaml
  - postgres-java/pvc.yaml
  - postgres-notifications/deployment.yaml
  - postgres-notifications/service.yaml
  - postgres-notifications/pvc.yaml
  # Infrastructure
  - redis/deployment.yaml
  - redis/service.yaml
  - rabbitmq/deployment.yaml
  - rabbitmq/service.yaml
  # Services
  - java-api/deployment.yaml
  - java-api/service.yaml
  - dotnet-notifications/deployment.yaml
  - dotnet-notifications/service.yaml
  - ml-python/deployment.yaml
  - ml-python/service.yaml
  # Ingress
  - ingress.yaml
