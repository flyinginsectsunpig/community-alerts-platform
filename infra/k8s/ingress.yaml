apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: community-alerts-ingress
  namespace: community-alerts
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # Basic rate limiting (complementary to application-level)
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "20"
spec:
  rules:
    - host: api.communityalerts.local # Change for production
      http:
        paths:
          - path: /api/v1/
            pathType: Prefix
            backend:
              service:
                name: java-api
                port:
                  number: 8080
          - path: /api/v1/ml/
            pathType: Prefix
            backend:
              service:
                name: ml-python
                port:
                  number: 8001
          - path: /api/v1/notifications/
            pathType: Prefix
            backend:
              service:
                name: dotnet-notifications
                port:
                  number: 5001
