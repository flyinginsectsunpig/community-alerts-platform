spring:
  datasource:
    url: jdbc:postgresql://postgres-communityalerts:5432/communityalertsdb
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  data:
    redis:
      host: redis
      port: 6379
      enabled: true   # activates RedisConfig — set to false for local dev without Redis
      ssl:
        enabled: true  # Azure Cache for Redis requires SSL (port 6380)

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest
    enabled: true     # activates RabbitMQConfig — set to false for local dev without RabbitMQ