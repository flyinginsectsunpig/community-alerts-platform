spring:
  application:
    name: community-alerts

  datasource:
    url: jdbc:postgresql://localhost:5433/communityalertsdb
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 500          # flush every 500 INSERT/UPDATE statements
        order_inserts: true        # group same-entity INSERTs for batching
        order_updates: true        # group same-entity UPDATEs for batching

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  # Async thread pool for Excel import jobs
  task:
    execution:
      pool:
        core-size: 2
        max-size: 4
        queue-capacity: 10
      thread-name-prefix: excel-import-

  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

server:
