spring:
  application:
    name: community-alerts

  datasource:
    url: jdbc:postgresql://localhost:5432/communityalertsdb
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 500          # flush every 500 INSERT/UPDATE statements
        order_inserts: true        # group same-entity INSERTs for batching
        order_updates: true        # group same-entity UPDATEs for batching

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  # Async thread pool for Excel import jobs
  task:
    execution:
      pool:
        core-size: 2
        max-size: 4
        queue-capacity: 10
      thread-name-prefix: excel-import-

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha

# Community Alerts config
app:
  rate-limit:
    incident-capacity: 10      # max 10 new incidents per minute per IP
    comment-capacity: 20       # max 20 comments per minute per IP
  jwt:
    secret: community-alerts-super-secret-key-change-in-production-please
    expiration-ms: 86400000    # 24 hours
  heat:
    weights:
      crime: 5
      fire: 4
      suspicious: 3
      accident: 2
      power: 1
      info: 1
    recency-days-full: 7       # incidents within 7 days → full weight
    recency-days-half: 30      # incidents 7–30 days → half weight

spring:
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
